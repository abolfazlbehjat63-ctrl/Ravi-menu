<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>راوی | منو</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Arabic:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== shared ===== */

  :root{
    --cream: #F2EFE1;
    --cream-deep: #E3E3C9;
    --terracotta: #A0554B;
    --terracotta-deep: #8A473E;
    --teal: #6E8286;
    --sage: #95B4A0;
    --ink: #3A2E28;
    --hairline: rgba(58,46,40,0.16);
  }

  html{
    color-scheme: light only;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background:
      radial-gradient(circle at 50% 0%, rgba(160,85,75,0.10), transparent 55%),
      radial-gradient(circle at 12% 100%, rgba(149,180,160,0.18), transparent 60%),
      radial-gradient(circle at 90% 85%, rgba(110,130,134,0.12), transparent 55%),
      var(--cream-deep);
    color:var(--ink);
    font-family:'Vazirmatn', sans-serif;
    overflow-x:hidden;
  }

  body{
    position:relative;
    min-height:100vh;
  }

  /* ---- background texture: tiny tiled "راوی" repeat ---- */
  .bg-texture{
    position:fixed;
    inset:-15% -10%;
    z-index:0;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    gap:22px 34px;
    transform:rotate(-7deg);
    opacity:0.14;
    pointer-events:none;
    user-select:none;
    color:var(--terracotta-deep);
    font-family:'Noto Serif Arabic', serif;
    font-size:13px;
    letter-spacing:3px;
    line-height:1;
  }

  /* ---- large watermark drop shape behind the list ---- */
  .watermark{
    position:absolute;
    z-index:0;
    top:50%;
    left:50%;
    width:min(70vw, 620px);
    transform:translate(-50%,-46%);
    opacity:0.06;
    pointer-events:none;
  }
  .watermark path{ fill:var(--terracotta); }

  .stage{
    position:relative;
    z-index:1;
    width:100%;
    max-width:560px;
    padding:8vh 24px 10vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .mark{
    width:34px;
    height:auto;
    margin-bottom:22px;
  }
  .mark path{ fill:var(--terracotta); }

  .wordmark{
    font-family:'Noto Serif Arabic', serif;
    font-weight:600;
    font-size:clamp(2.6rem, 8vw, 3.6rem);
    color:var(--terracotta-deep);
    letter-spacing:1px;
  }

  .tagline{
    margin-top:10px;
    font-size:0.78rem;
    font-weight:400;
    letter-spacing:4px;
    color:var(--teal);
    text-transform:none;
  }

  .divider{
    width:40px;
    height:1px;
    background:var(--sage);
    margin:34px 0 6px;
    opacity:0.9;
  }

  .menu-list{
    width:100%;
    margin-top:26px;
    display:flex;
    flex-direction:column;
  }

  .menu-item{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:22px 8px;
    border-top:1px solid var(--hairline);
    font-family:'Noto Serif Arabic', serif;
    font-weight:700;
    font-size:clamp(1.15rem, 4vw, 1.55rem);
    color:#241A15;
    text-decoration:none;
    letter-spacing:0.5px;
    transition:color .35s ease, letter-spacing .35s ease;
    cursor:pointer;
  }
  .menu-list a:last-child{
    border-bottom:1px solid var(--hairline);
  }

  .menu-item::before{
    content:"";
    position:absolute;
    right:calc(50% + 128px);
    width:12px; height:12px;
    background:var(--sage);
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C9 8 5 11 5 15.5A7 7 0 0 0 19 15.5C19 11 15 8 12 2Z'/></svg>") center/contain no-repeat;
    mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C9 8 5 11 5 15.5A7 7 0 0 0 19 15.5C19 11 15 8 12 2Z'/></svg>") center/contain no-repeat;
    opacity:0;
    transform:translateY(-50%) scale(.4);
    top:50%;
    transition:opacity .35s ease, transform .35s ease;
  }

  .menu-item:hover,
  .menu-item:focus-visible{
    color:var(--terracotta-deep);
    letter-spacing:2px;
  }
  .menu-item:hover::before,
  .menu-item:focus-visible::before{
    opacity:1;
    transform:translateY(-50%) scale(1);
  }

  .menu-item:focus-visible{
    outline:2px solid var(--terracotta);
    outline-offset:4px;
  }

  #screen-home footer.note{
    position:relative;
    z-index:1;
    margin-top:40px;
    font-size:0.68rem;
    letter-spacing:2px;
    color:var(--teal);
    opacity:0.75;
  }

  @media (max-width:420px){
    .menu-item::before{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .menu-item, .menu-item::before{ transition:none; }
  }

/* ===== category screens ===== */

  header, main{
    position:relative;
    z-index:1;
  }

  .cat-screen header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(250,248,241,0.96);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--hairline);
    padding:26px 22px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    overflow:hidden;
  }

  .header-texture{
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
    user-select:none;
  }
  .header-texture .row{
    position:absolute;
    right:0; left:0;
    display:flex;
    flex-wrap:nowrap;
    justify-content:flex-start;
    gap:12px;
    opacity:0.24;
    color:var(--terracotta-deep);
    font-family:'Noto Serif Arabic', serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:2px;
    line-height:1;
    white-space:nowrap;
    overflow:hidden;
  }
  .header-texture .row.top{ top:6px; }
  .header-texture .row.bottom{ bottom:6px; }
  .header-texture .row.middle{
    top:50%;
    transform:translateY(-50%);
  }

  .cat-screen header .back, .cat-screen header h1{
    background:#FAF8F1;
    padding:4px 10px;
    border-radius:8px;
  }

  .cat-screen header .back, .cat-screen header h1, .cat-screen header .spacer{
    position:relative;
    z-index:1;
  }

  .back{
    display:flex;
    align-items:center;
    gap:6px;
    text-decoration:none;
    color:var(--teal);
    font-size:0.85rem;
    letter-spacing:0.5px;
    cursor:pointer;
  }
  .back svg{ width:16px; height:16px; }
  .back path{ stroke:var(--teal); }

  .cat-screen header h1{
    font-family:'Noto Serif Arabic', serif;
    font-weight:700;
    font-size:1.3rem;
    color:var(--terracotta-deep);
  }

  .spacer{ width:60px; }

  .cat-screen main{
    max-width:640px;
    margin:0 auto;
    padding:8vh 20px 14vh;
  }

  .item-card{
    perspective:1200px;
    margin-bottom:14vh;
    opacity:1;
    transform:translateY(0);
    transition:opacity .8s ease, transform .8s ease;
  }
  .item-card.pre-reveal{
    opacity:0;
    transform:translateY(40px);
  }

  .item-figure{
    position:relative;
    display:flex;
    justify-content:center;
    transform-style:preserve-3d;
    transform:rotateX(6deg);
    transition:transform .5s ease;
  }
  .item-card:hover .item-figure{
    transform:rotateX(0deg) translateY(-6px);
  }

  .photo-plate{
    width:min(64%, 280px);
    aspect-ratio: 2 / 3;
    border-radius:28px;
    overflow:hidden;
    background:linear-gradient(160deg, #ffffff 0%, #f2ede1 100%);
    box-shadow:
      0 2px 0 rgba(255,255,255,0.6) inset,
      0 25px 20px rgba(36,26,21,0.12),
      0 45px 40px rgba(36,26,21,0.16);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .item-figure img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 35%;
    display:block;
  }

  .item-info{
    text-align:center;
    margin-top:26px;
  }

  .item-name{
    font-family:'Noto Serif Arabic', serif;
    font-weight:700;
    font-size:clamp(1.3rem, 4vw, 1.7rem);
    color:var(--terracotta-deep);
    transition:font-weight .3s ease, letter-spacing .3s ease;
  }
  .item-card.active .item-name{
    font-weight:900;
    letter-spacing:0.5px;
  }

  .item-price{
    margin-top:8px;
    font-size:0.92rem;
    font-weight:500;
    color:var(--terracotta-deep);
    letter-spacing:0.5px;
  }

  .item-price .unit{
    color:var(--teal);
    font-weight:400;
    font-size:0.82rem;
  }

  .cat-screen footer.note{
    text-align:center;
    font-size:0.68rem;
    letter-spacing:2px;
    color:var(--teal);
    opacity:0.7;
    padding-bottom:6vh;
  }

  /* ---- empty category ---- */
  .empty-state{
    text-align:center;
    padding:14vh 20px;
  }
  .empty-state svg{
    width:38px; height:38px;
    margin-bottom:18px;
    opacity:0.5;
  }
  .empty-state svg path{ fill:var(--sage); }
  .empty-state p{
    font-family:'Noto Serif Arabic', serif;
    font-weight:600;
    font-size:1.1rem;
    color:var(--teal);
  }

  /* ---- loading / error ---- */
  .status-veil{
    position:fixed;
    inset:0;
    z-index:50;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    background:var(--cream-deep);
    color:var(--terracotta-deep);
    font-family:'Noto Serif Arabic', serif;
    font-weight:600;
    font-size:1.2rem;
    transition:opacity .5s ease;
  }
  .status-veil.hidden{ opacity:0; pointer-events:none; }
  .status-veil .pulse{
    width:14px; height:14px;
  }
  .status-veil .pulse path{ fill:var(--terracotta); }
  @keyframes breathe { 0%,100%{ transform:scale(1); opacity:.6 } 50%{ transform:scale(1.3); opacity:1 } }
  .status-veil .pulse{ animation:breathe 1.4s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce){
    .status-veil .pulse{ animation:none; }
    .item-card, .item-figure{ transition:none; }
  }

/* ===== screen switching ===== */

  #screen-home{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cat-screen{
    position:relative;
    z-index:1;
    display:none;
  }
</style>
</head>
<body>

  <div class="bg-texture" id="bgTexture" aria-hidden="true"></div>

  <div class="status-veil" id="statusVeil">
    <svg class="pulse" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 2C9 8 5 11 5 15.5A7 7 0 0 0 19 15.5C19 11 15 8 12 2Z"/>
    </svg>
    <span id="statusText">راوی</span>
  </div>

  <section id="screen-home">

    <svg class="watermark" viewBox="0 0 200 260" aria-hidden="true">
      <path d="M100 6C70 70 20 108 20 168C20 216 55 254 100 254C145 254 180 216 180 168C180 108 130 70 100 6Z"/>
    </svg>

    <main class="stage">
      <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2C9 8 5 11 5 15.5A7 7 0 0 0 19 15.5C19 11 15 8 12 2Z"/>
      </svg>

      <h1 class="wordmark" id="brandName">راوی</h1>
      <p class="tagline" id="brandTagline">فراتر از روزمرگی</p>
      <div class="divider"></div>

      <nav class="menu-list" id="menuList"></nav>

      <footer class="note" id="brandFooterHome">RAVI · CAFÉ</footer>
    </main>

  </section>

  <div id="catScreens"></div>

<script>
(function(){
  'use strict';

  var faDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
  function toFa(numStr){
    return String(numStr).replace(/[0-9]/g, function(d){ return faDigits[+d]; });
  }
  function formatPrice(n){
    var s = Number(n).toLocaleString('en-US'); // 200,000
    return toFa(s);
  }
  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var DROP = 'M12 2C9 8 5 11 5 15.5A7 7 0 0 0 19 15.5C19 11 15 8 12 2Z';
  var veil = document.getElementById('statusVeil');
  var statusText = document.getElementById('statusText');
  var initedScreens = {};
  var currentScreen = 'home';

  /* ---- shared background texture ---- */
  var bg = document.getElementById('bgTexture');
  var cols = Math.ceil(window.innerWidth / 60) + 6;
  var rows = Math.ceil(window.innerHeight / 34) + 6;
  var frag = document.createDocumentFragment();
  for(var i=0; i<cols*rows; i++){
    var span = document.createElement('span');
    span.textContent = 'راوی';
    frag.appendChild(span);
  }
  bg.appendChild(frag);

  /* ---- render everything from data ---- */
  function render(data){
    var settings = data.settings || {};
    document.getElementById('brandName').textContent = settings.brandName || 'راوی';
    document.getElementById('brandTagline').textContent = settings.tagline || '';
    document.getElementById('brandFooterHome').textContent = settings.footer || 'RAVI · CAFÉ';
    document.title = (settings.brandName || 'راوی') + ' | منو';

    var currency = settings.currency || 'تومان';
    var nav = document.getElementById('menuList');
    var screens = document.getElementById('catScreens');
    nav.innerHTML = '';
    screens.innerHTML = '';

    (data.categories || []).forEach(function(cat){
      /* home link */
      var a = document.createElement('a');
      a.className = 'menu-item';
      a.href = '#';
      a.setAttribute('data-nav', cat.id);
      a.textContent = cat.title;
      nav.appendChild(a);

      /* category screen */
      var sec = document.createElement('section');
      sec.className = 'cat-screen';
      sec.id = 'screen-' + cat.id;

      var itemsHtml = '';
      if(cat.items && cat.items.length){
        cat.items.forEach(function(item){
          itemsHtml +=
            '<div class="item-card">' +
              '<div class="item-figure">' +
                '<div class="photo-plate"><img loading="lazy" src="' + esc(item.image || '') + '" alt="' + esc(item.name) + '"></div>' +
              '</div>' +
              '<div class="item-info">' +
                '<div class="item-name">' + esc(item.name) + '</div>' +
                '<div class="item-price">' + formatPrice(item.price) + ' <span class="unit">' + esc(currency) + '</span></div>' +
              '</div>' +
            '</div>';
        });
      } else {
        itemsHtml =
          '<div class="empty-state">' +
            '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="' + DROP + '"/></svg>' +
            '<p>این بخش به‌زودی تکمیل می‌شود</p>' +
          '</div>';
      }

      sec.innerHTML =
        '<header>' +
          '<div class="header-texture" aria-hidden="true">' +
            '<div class="row top"></div><div class="row middle"></div><div class="row bottom"></div>' +
          '</div>' +
          '<a class="back" href="#" data-nav="home">' +
            '<svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            'راوی' +
          '</a>' +
          '<h1>' +
            '<svg viewBox="0 0 24 24" style="width:14px;height:14px;vertical-align:-1px;margin-left:4px;" aria-hidden="true">' +
              '<path d="' + DROP + '" fill="var(--terracotta-deep)"/>' +
            '</svg>' +
            esc(cat.title) +
          '</h1>' +
          '<div class="spacer"></div>' +
        '</header>' +
        '<main>' + itemsHtml +
          '<footer class="note">' + esc(settings.footer || 'RAVI · CAFÉ') + '</footer>' +
        '</main>';

      screens.appendChild(sec);
    });

    /* nav wiring (delegated) */
    document.querySelectorAll('[data-nav]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.preventDefault();
        showScreen(el.getAttribute('data-nav'));
      });
    });

    veil.classList.add('hidden');
  }

  function initItemScreen(section){
    if(initedScreens[section.id]) return;
    initedScreens[section.id] = true;

    section.querySelectorAll('.header-texture .row').forEach(function(row){
      for(var i=0; i<55; i++){
        var span = document.createElement('span');
        span.textContent = 'راوی';
        row.appendChild(span);
      }
    });

    var cards = section.querySelectorAll('.item-card');
    if('IntersectionObserver' in window && cards.length){
      cards.forEach(function(c){ c.classList.add('pre-reveal'); });
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){
            e.target.classList.remove('pre-reveal');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.15 });
      cards.forEach(function(c){ io.observe(c); });

      var activeIO = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){ e.target.classList.add('active'); }
          else { e.target.classList.remove('active'); }
        });
      }, { threshold: 0.5 });
      cards.forEach(function(c){ activeIO.observe(c); });
    }
  }

  function showScreen(name){
    var home = document.getElementById('screen-home');
    home.style.display = (name === 'home') ? 'flex' : 'none';
    document.querySelectorAll('.cat-screen').forEach(function(el){
      el.style.display = (el.id === 'screen-' + name) ? 'block' : 'none';
    });
    window.scrollTo(0,0);
    currentScreen = name;
    if(name !== 'home'){
      var target = document.getElementById('screen-' + name);
      if(target) initItemScreen(target);
    }
  }

  /* ---- load data (always fresh) ---- */
  function load(){
    fetch('menu-data.json?v=' + Date.now(), { cache: 'no-store' })
      .then(function(r){
        if(!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(function(err){
        statusText.textContent = 'منو در دسترس نیست، لطفاً دوباره تلاش کنید';
        console.error(err);
      });
  }

  load();
})();
</script>

</body>
</html>
